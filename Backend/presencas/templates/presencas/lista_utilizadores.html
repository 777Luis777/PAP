<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceTrack</title>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 700px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            border-radius: 20px 20px 0 0;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .header p {
            margin-top: 8px;
            color: #777;
            font-size: 15px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        thead {
            background: linear-gradient(135deg, #2196F3, #42A5F5);
            color: white;
        }

        thead th {
            padding: 16px;
            text-align: left;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody td {
            padding: 16px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        tbody tr:nth-child(even) {
            background: #f9f9f9;
        }

        tbody tr:hover {
            background: #e3f2fd;
        }

        .name {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            font-weight: 500;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-icons {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: #f5f5f5;
            color: #333;
            text-decoration: none;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .action-icon:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }

        .action-icon.delete {
            color: #d32f2f;
        }

        .btn {
            padding: 10px 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #fff;
        }

        .btn-primary {
            background: #2196F3;
        }

        .btn-primary:hover {
            background: #1a73d8;
            transform: translateY(-1px);
        }

        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: white;
            display: inline-block;
        }

        .badge-ok {
            background: #4CAF50;
        }

        .badge-late {
            background: #f44336;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
            text-align: center;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            tbody td, thead th {
                padding: 12px;
            }
        }
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f5f5f5;
            color: #333;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #e0e0e0;
            transform: translateX(3px); /* efeito coerente com a direita */
        }

    </style>
</head>

<body>
    <div class="container">
        <a href="{% url 'administracao' %}" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Voltar
        </a>

        <div class="header">
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px;">
                <div>
                    <h1>Utilizadores</h1>
                    <p>Lista de utilizadores registados</p>
                </div>
                <a href="{% url 'adicionar_utilizador' %}" class="btn btn-primary" style="padding: 10px 14px; border-radius: 12px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-top: 25px;">
                    <i class="fa-solid fa-plus"></i>
                    Adicionar
                </a>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in utilizadores %}
                    <tr>
                        <td class="name">
                            <div class="user-info">
                                <i class="fa-solid fa-user"></i>
                                <span>{{ user.nome }}</span>
                            </div>

                            <span class="action-icons">
                                <a href="{% url 'editar_utilizador' user.id %}" class="action-icon" title="Editar">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </a>
                                <a href="{% url 'eliminar_utilizador' user.id %}" class="action-icon delete" title="Eliminar">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </span>
                            
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="1">Sem utilizadores registados</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="footer">
            FaceTrack - Sistema de Gestão de Presenças © 2026
        </div>
    </div>
</body>
</html>
