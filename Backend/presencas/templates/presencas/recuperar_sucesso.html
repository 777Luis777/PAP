<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucesso - FaceTrack</title>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--gradient-body);
        }

        .login-card {
            width: 100%;
            max-width: 520px;
            margin: 20px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .login-header {
            text-align: center;
            margin-bottom: 0;
            background: var(--gradient-brand);
            color: #ffffff;
            padding: 40px 20px;
            border-radius: 14px 14px 0 0;
        }

        .login-header .logo {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .login-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            display: block;
            text-align: center;
            margin-bottom: 10px;
        }

        .login-header p {
            margin: 0;
            opacity: 0.95;
            font-size: 0.95rem;
        }

        .login-card .card-body {
            padding: 30px 25px;
            text-align: center;
        }

        .btn-login {
            width: 100%;
            max-width: 300px;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            background: var(--gradient-brand);
            color: #ffffff;
            border: none;
            transition: all 0.25s ease;
            display: inline-block;
            margin-top: 20px;
        }

        .btn-login:hover {
            background: var(--gradient-brand-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(37, 99, 235, 0.3);
            color: #ffffff;
            text-decoration: none;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .success-message {
            margin: 20px 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .success-icon {
            color: #10b981;
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .login-header h1 {
                font-size: 1.8rem;
            }

            .login-header .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1>Sucesso!</h1>
                <p>Palavra-Passe Alterada com Sucesso</p>
            </div>

            <div class="card-body">
                <div class="success-icon">
                    <i class="fas fa-thumbs-up"></i>
                </div>

                <div class="success-message">
                    <p>
                        <strong>A sua palavra-passe foi alterada com sucesso!</strong>
                    </p>
                    <p>
                        Pode agora fazer login com a sua nova palavra-passe.
                    </p>
                </div>

                <a href="{% url 'login' %}" class="btn btn-login">
                    <i class="fas fa-sign-in-alt"></i> Ir para o Login
                </a>

                <div class="form-footer">
                    <i class="fas fa-shield-alt"></i> Acesso Seguro
                </div>
            </div>

            <div class="card-footer text-center text-muted">
                <small>&copy; 2026 FaceTrack - Todos os direitos reservados</small>
            </div>
        </div>
    </div>
</body>
</html>
