<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Utilizador</title>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            border-radius: 20px 20px 0 0;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .header p {
            margin-top: 8px;
            color: #777;
            font-size: 15px;
        }

        form {
            display: grid;
            gap: 18px;
        }

        label {
            font-weight: 500;
            font-size: 14px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        input:focus {
            border-color: #2196F3;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn-primary {
            background: #2196F3;
            color: white;
        }

        .btn-primary:hover {
            background: #1a73d8;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }

        .error {
            padding: 10px 14px;
            border-radius: 12px;
            background: #fdecea;
            border: 1px solid #f5c6cb;
            color: #a94442;
            font-size: 14px;
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
            text-align: center;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 1.8rem;
            }
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #f5f5f5;
            color: #333;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #e0e0e0;
            transform: translateX(3px);
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <h1>Adicionar Utilizador</h1>
            <p>Preencha os dados do novo utilizador.</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required>

            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>

            <label for="imagem">Imagem (foto)</label>
            <input id="imagem" name="imagem" type="file" accept="image/*" required>

            <label>
                Administrador
                <input type="checkbox" name="administrador">
            </label>

            <div class="actions">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{% url 'lista_utilizadores' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>

        <div class="footer">
            FaceTrack - Sistema de Gestão de Presenças © 2026
        </div>
    </div>
</body>
</html>
