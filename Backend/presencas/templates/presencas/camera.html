<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <title>Câmara - FaceTrack</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .camera-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .camera-container {
            flex: 1;
            background: var(--gradient-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .camera-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .camera-header {
            background: var(--gradient-brand);
            color: #ffffff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .camera-header h1 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
        }

        .camera-header h1 i {
            color: #ffffff;
        }

        .camera-body {
            padding: 30px 20px;
        }

        .camera-box {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #020617;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
        }

        .camera-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detected-person {
            background: var(--surface-soft);
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 60px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            color: var(--text);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detected-person .name {
            color: var(--primary);
            font-weight: 700;
        }

        .detected-person.unknown {
            border-color: var(--warning);
            background: #fff8e6;
        }

        .detected-person.unknown .name {
            color: var(--warning-dark);
        }

        .back-btn {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.32);
            transform: translateX(-3px);
            color: #ffffff;
        }

        .message {
            padding: 12px 15px;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            display: block;
            background: #edfdf2;
            color: #166534;
            border: 1px solid #86efac;
        }

        .message.error {
            display: block;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(2, 6, 23, 0.65);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: #ffffff;
            margin: 5% auto;
            padding: 0;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 450px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: var(--gradient-brand);
            color: #ffffff;
            padding: 20px;
            border-radius: 16px 16px 0 0;
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
        }

        .modal-body {
            padding: 30px 20px;
            text-align: center;
        }

        .modal-person {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 20px 0;
            word-break: break-word;
        }

        .modal-text {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 15px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-buttons.single {
            gap: 0;
        }

        .modal-btn {
            flex: 1;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .modal-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.18);
        }

        .modal-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-modal-entrada {
            background: linear-gradient(135deg, var(--success), #22c55e);
            color: #ffffff;
        }

        .btn-modal-saida {
            background: linear-gradient(135deg, var(--warning), #fbbf24);
            color: #1f2937;
        }

        .btn-modal-ok {
            background: linear-gradient(135deg, var(--info), #0ea5e9);
            color: #ffffff;
            width: 100%;
        }

        .close-modal {
            color: #ffffff;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
            background: none;
            border: none;
            padding: 0;
        }

        .close-modal:hover {
            transform: scale(1.15);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-recording {
            background: #fef2f2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            .camera-card {
                max-width: 100%;
            }

            .camera-body {
                padding: 20px 15px;
            }

            .modal-content {
                width: 95%;
            }
        }
    </style>
</head>
<body class="camera-wrapper">
    <div class="camera-container">
        <div class="camera-card">
            <div class="camera-header">
                <h1><i class="fas fa-camera"></i> Câmara</h1>
                <a href="{% url 'home' %}" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Voltar
                </a>
            </div>

            <div class="camera-body">
                <div class="camera-box">
                    <video id="video" autoplay></video>
                    <canvas id="canvas" style="display:none;"></canvas>
                </div>

                <div class="detected-person" id="detectedPerson">
                    <span>Pessoa Detetada: <span class="name" id="personName"></span></span>
                </div>

                <div class="message" id="messageBox"></div>

                <div class="text-center text-muted mt-3">
                    <small>
                        <i class="fas fa-info-circle"></i>
                        Sistema pronto para reconhecimento facial
                    </small>
                </div>
            </div>
        </div>
    </div>

    <div id="choiceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close-modal" onclick="fecharModalEscolha()">&times;</button>
                <div>Registar Presença</div>
            </div>
            <div class="modal-body">
                <div class="modal-person" id="modalPersonName"></div>
                <div class="modal-text">Selecione o tipo de registo:</div>
                <div class="modal-buttons">
                    <button class="modal-btn btn-modal-entrada" onclick="registarPresenca('entrada')" id="btnEntrada">
                        <i class="fas fa-door-open"></i> Entrada
                    </button>
                    <button class="modal-btn btn-modal-saida" onclick="registarPresenca('saida')" id="btnSaida">
                        <i class="fas fa-door-closed"></i> Saída
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="confirmationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header" id="confirmationTitle"></div>
            <div class="modal-body">
                <div class="modal-text" id="confirmationMessage"></div>
                <div class="modal-buttons single">
                    <button class="modal-btn btn-modal-ok" onclick="irParaHome()">
                        <i class="fas fa-check"></i> OK
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let lastDetectedPerson = null;
        let isProcessing = false;
        let pollingInterval = null;

        function checkDetectedPerson() {
            fetch('{% url "get_detected_person" %}')
                .then(response => response.json())
                .then(data => {
                    if (data.detectado) {
                        if (lastDetectedPerson !== data.nome) {
                            lastDetectedPerson = data.nome;
                            const personDiv = document.getElementById('detectedPerson');
                            const personName = document.getElementById('personName');

                            personName.textContent = data.nome;

                            if (data.nome === 'Desconhecido') {
                                personDiv.classList.add('unknown');
                            } else {
                                personDiv.classList.remove('unknown');
                            }

                            personDiv.style.display = 'block';
                            abrirModalEscolha(data.nome);
                        }
                    } else if (lastDetectedPerson !== null) {
                        lastDetectedPerson = null;
                        document.getElementById('detectedPerson').style.display = 'none';
                    }
                })
                .catch(error => console.log('Polling error:', error));
        }

        function abrirModalEscolha(nome) {
            document.getElementById('modalPersonName').textContent = nome;
            document.getElementById('choiceModal').style.display = 'block';
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }

        function fecharModalEscolha() {
            document.getElementById('choiceModal').style.display = 'none';
            lastDetectedPerson = null;
            document.getElementById('detectedPerson').style.display = 'none';
            if (!pollingInterval) {
                pollingInterval = setInterval(checkDetectedPerson, 500);
            }
        }

        function registarPresenca(tipo) {
            if (isProcessing) return;

            const personName = document.getElementById('modalPersonName').textContent;

            if (!personName) {
                alert('Nenhuma pessoa detetada. Tente novamente.');
                return;
            }

            isProcessing = true;
            desativarBotoes();

            const dados = {
                nome: personName,
                tipo: tipo
            };

            fetch('{% url "registar_presenca" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify(dados)
            })
            .then(response => response.json())
            .then(data => {
                if (data.sucesso) {
                    fecharModalEscolha();
                    mostrarConfirmacao(personName, tipo, data.data_hora);
                } else {
                    alert(`Erro: ${data.erro}`);
                }
                isProcessing = false;
                ativarBotoes();
            })
            .catch(error => {
                console.error('Erro:', error);
                alert('Erro ao registar presença. Tente novamente.');
                isProcessing = false;
                ativarBotoes();
            });
        }

        function mostrarConfirmacao(nome, tipo, dataHora) {
            const tipoTexto = tipo === 'entrada' ? 'ENTRADA' : 'SAÍDA';
            const titulo = document.getElementById('confirmationTitle');
            const mensagem = document.getElementById('confirmationMessage');

            titulo.innerHTML = '<i class="fas fa-check-circle"></i> Presença Registada';
            mensagem.innerHTML = `<strong>${nome}</strong><br><br>
                                  Tipo: <strong>${tipoTexto}</strong><br>
                                  Data/Hora: <strong>${dataHora}</strong>`;

            document.getElementById('confirmationModal').style.display = 'block';
        }

        function irParaHome() {
            window.location.href = "{% url 'home' %}";
        }

        function desativarBotoes() {
            document.getElementById('btnEntrada').disabled = true;
            document.getElementById('btnSaida').disabled = true;
        }

        function ativarBotoes() {
            document.getElementById('btnEntrada').disabled = false;
            document.getElementById('btnSaida').disabled = false;
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        window.onclick = function(event) {
            const choiceModal = document.getElementById('choiceModal');
            if (event.target === choiceModal) {
                fecharModalEscolha();
            }
        };

        document.addEventListener('DOMContentLoaded', function() {
            pollingInterval = setInterval(checkDetectedPerson, 500);
            checkDetectedPerson();
        });

        window.addEventListener('beforeunload', function() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
        });
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // abrir câmara no browser
        navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        });

        setInterval(() => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            ctx.drawImage(video, 0, 0);

            const image = canvas.toDataURL("image/jpeg");

            fetch("{% url 'gen_frames' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCookie('csrftoken')
                },
                body: JSON.stringify({ image: image })
            })
            .then(res => res.json())
            .then(data => {
                console.log("Pessoa:", data.nome);

                if (data.nome && data.nome !== "Desconhecido") {
                    document.getElementById("personName").textContent = data.nome;
                }
            });

        }, 700);
    </script>
</body>
</html>
