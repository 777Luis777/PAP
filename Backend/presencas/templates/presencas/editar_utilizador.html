<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Utilizador - FaceTrack</title>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fas fa-face-smile"></i> FaceTrack
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'lista_utilizadores' %}">
                            <i class="fas fa-arrow-left"></i> Voltar
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid py-5">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <!-- Header -->
                <div class="mb-4">
                    <h1 class="mb-1">
                        <i class="fas fa-user-edit"></i> Editar Utilizador
                    </h1>
                    <p class="text-muted">Atualize os dados do utilizador</p>
                </div>

                <!-- Form Card -->
                <div class="card">
                    {% if error %}
                    <div class="alert alert-danger m-4 alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <strong>Erro!</strong> {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}

                    <div class="card-body p-4">
                        <form method="post" enctype="multipart/form-data" novalidate>
                            {% csrf_token %}

                            <!-- Username -->
                            <div class="form-group mb-4">
                                <label for="username" class="form-label">
                                    <i class="fas fa-at"></i> Username
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="username" 
                                    name="username" 
                                    value="{{ utilizador.username }}"
                                    required
                                >
                            </div>

                            <!-- Nome -->
                            <div class="form-group mb-4">
                                <label for="nome" class="form-label">
                                    <i class="fas fa-user"></i> Nome Completo
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="nome" 
                                    name="nome" 
                                    value="{{ utilizador.nome }}"
                                    required
                                >
                            </div>

                            <!-- Imagem Atual -->
                            {% if utilizador.imagem %}
                            <div class="form-group mb-4">
                                <label class="form-label">
                                    <i class="fas fa-image"></i> Foto Atual
                                </label>
                                <div>
                                    <img src="{{ utilizador.imagem.url }}" alt="Foto de {{ utilizador.nome }}" 
                                         class="img-thumbnail" style="max-width: 150px;">
                                </div>
                            </div>
                            {% endif %}

                            <!-- Foto/Imagem -->
                            <div class="form-group mb-4">
                                <label for="imagem" class="form-label">
                                    <i class="fas fa-image"></i> Atualizar Foto (opcional)
                                </label>
                                <input 
                                    type="file" 
                                    class="form-control" 
                                    id="imagem" 
                                    name="imagem" 
                                    accept="image/*"
                                >
                                <small class="text-muted d-block mt-2">
                                    <i class="fas fa-info-circle"></i> Deixe em branco para manter a foto atual
                                </small>
                            </div>

                            <!-- Password -->
                            <div class="form-group mb-4">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock"></i> Nova Senha (opcional)
                                </label>
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="password" 
                                    name="password" 
                                    placeholder="Deixe em branco para manter a atual"
                                >
                                <small class="text-muted d-block mt-2">
                                    <i class="fas fa-info-circle"></i> Mínimo 8 caracteres recomendado
                                </small>
                            </div>

                            <!-- Admin Checkbox -->
                            <div class="form-check mb-4">
                                <input 
                                    class="form-check-input" 
                                    type="checkbox" 
                                    id="administrador" 
                                    name="administrador"
                                    {% if utilizador.administrador %}checked{% endif %}
                                >
                                <label class="form-check-label" for="administrador">
                                    <i class="fas fa-shield-alt"></i> Administrador
                                </label>
                            </div>

                            <!-- Actions -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary flex-grow-1">
                                    <i class="fas fa-save"></i> Guardar Alterações
                                </button>
                                <a href="{% url 'lista_utilizadores' %}" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
</body>
</html>
