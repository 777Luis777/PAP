<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FaceTrack</title>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--gradient-body);
        }

        .login-card {
            width: 100%;
            max-width: 520px;
            margin: 20px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .login-header {
            text-align: center;
            margin-bottom: 0;
            background: var(--gradient-brand);
            color: #ffffff;
            padding: 40px 20px;
            border-radius: 14px 14px 0 0;
        }

        .login-header .logo {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .login-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #ffffff;
            justify-content: center;
        }

        .login-header p {
            font-size: 1rem;
            opacity: 0.92;
            margin-bottom: 0;
            color: rgba(255, 255, 255, 0.92);
        }

        .login-card .card-body {
            padding: 30px 25px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
            background: var(--gradient-brand);
            color: #ffffff;
            border: none;
            transition: all 0.25s ease;
        }

        .btn-login:hover {
            background: var(--gradient-brand-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(37, 99, 235, 0.3);
            color: #ffffff;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        @media (max-width: 480px) {
            .login-header h1 {
                font-size: 1.8rem;
            }

            .login-header .logo {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-face-smile"></i>
                </div>
                <h1>FaceTrack</h1>
                <p>Sistema de Gestão de Presenças</p>
            </div>

            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <strong>Erro!</strong> {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Nome de Utilizador
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Introduza o seu nome de utilizador" required>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Senha
                        </label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Introduza a sua senha" required>
                    </div>

                    <button type="submit" class="btn btn-login">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>

                <div class="form-footer">
                    <i class="fas fa-shield-alt"></i> Acesso Seguro
                </div>
            </div>

            <div class="card-footer text-center text-muted">
                <small>&copy; 2026 FaceTrack - Todos os direitos reservados</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
